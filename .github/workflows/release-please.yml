name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute docs-only release override
        id: docs_release
        shell: bash
        run: |
          set -euo pipefail

          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$last_tag" ]; then
            range="${last_tag}..HEAD"
          else
            range="HEAD"
          fi

          subjects="$(git log --format=%s $range)"
          has_docs=false
          has_releasable=false

          while IFS= read -r subject; do
            [ -z "$subject" ] && continue

            case "$subject" in
              docs:*|docs\(*\):*|docs!:*|docs\(*\)!:*)
                has_docs=true
                ;;
            esac

            case "$subject" in
              feat:*|feat\(*\):*|feat!:*|feat\(*\)!:*|fix:*|fix\(*\):*|fix!:*|fix\(*\)!:*|deps:*|deps\(*\):*|deps!:*|deps\(*\)!:*)
                has_releasable=true
                ;;
            esac
          done <<< "$subjects"

          if [ "$has_docs" != true ] || [ "$has_releasable" = true ]; then
            echo "release_as=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_version="$(node -p "require('./.release-please-manifest.json')['.'] || require('./package.json').version")"
          IFS='.' read -r major minor patch <<< "$current_version"
          echo "release_as=${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"

      - name: Run release-please
        if: ${{ steps.docs_release.outputs.release_as == '' }}
        id: release_default
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run release-please for docs-only release
        if: ${{ steps.docs_release.outputs.release_as != '' }}
        id: release_docs
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ steps.docs_release.outputs.release_as }}

      - name: Resolve release outcome
        id: release_outcome
        shell: bash
        env:
          DEFAULT_RELEASE_CREATED: ${{ steps.release_default.outputs.release_created || 'false' }}
          DOCS_RELEASE_CREATED: ${{ steps.release_docs.outputs.release_created || 'false' }}
          DEFAULT_PRS_CREATED: ${{ steps.release_default.outputs.prs_created || 'false' }}
          DOCS_PRS_CREATED: ${{ steps.release_docs.outputs.prs_created || 'false' }}
          DEFAULT_TAG_NAME: ${{ steps.release_default.outputs.tag_name || '' }}
          DOCS_TAG_NAME: ${{ steps.release_docs.outputs.tag_name || '' }}
          RELEASE_AS: ${{ steps.docs_release.outputs.release_as || '' }}
        run: |
          set -euo pipefail

          release_created=false
          release_kind=none
          tag_name=""

          if [ "$DOCS_RELEASE_CREATED" = "true" ]; then
            release_created=true
            release_kind=docs-only-release
            tag_name="$DOCS_TAG_NAME"
          elif [ "$DEFAULT_RELEASE_CREATED" = "true" ]; then
            release_created=true
            release_kind=release
            tag_name="$DEFAULT_TAG_NAME"
          elif [ "$DOCS_PRS_CREATED" = "true" ]; then
            release_kind=docs-only-release-pr
          elif [ "$DEFAULT_PRS_CREATED" = "true" ]; then
            release_kind=release-pr
          fi

          echo "release_created=${release_created}" >> "$GITHUB_OUTPUT"
          echo "release_kind=${release_kind}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

          {
            echo "### Release Please Outcome"
            case "$release_kind" in
              docs-only-release)
                echo "- Created docs-only release tag \`${tag_name}\`."
                echo "- Publish steps will run in this workflow."
                ;;
              release)
                echo "- Created release tag \`${tag_name}\`."
                echo "- Publish steps will run in this workflow."
                ;;
              docs-only-release-pr)
                echo "- Opened or updated a docs-only release PR."
                if [ -n "$RELEASE_AS" ]; then
                  echo "- Proposed patch release override: \`${RELEASE_AS}\`."
                fi
                echo "- Publish steps are intentionally skipped until that release PR is merged."
                ;;
              release-pr)
                echo "- Opened or updated a release PR."
                echo "- Publish steps are intentionally skipped until that release PR is merged."
                ;;
              *)
                echo "- No release PR or GitHub release was created in this run."
                echo "- Publish steps are intentionally skipped."
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on hidden releasable merge commits
        if: ${{ steps.release_outcome.outputs.release_kind == 'none' }}
        shell: bash
        run: |
          set -euo pipefail

          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$last_tag" ]; then
            range="${last_tag}..HEAD"
          else
            range="HEAD"
          fi

          head_subject="$(git log -1 --format=%s)"
          case "$head_subject" in
            "Merge pull request #"*)
              ;;
            *)
              exit 0
              ;;
          esac

          has_nested_release_candidate=false
          index=0
          while IFS= read -r subject; do
            [ -z "$subject" ] && continue

            if [ "$index" -eq 0 ]; then
              index=$((index + 1))
              continue
            fi

            case "$subject" in
              docs:*|docs\(*\):*|docs!:*|docs\(*\)!:*|feat:*|feat\(*\):*|feat!:*|feat\(*\)!:*|fix:*|fix\(*\):*|fix!:*|fix\(*\)!:*|deps:*|deps\(*\):*|deps!:*|deps\(*\)!:*)
                has_nested_release_candidate=true
                break
                ;;
            esac

            index=$((index + 1))
          done <<< "$(git log --format=%s $range)"

          if [ "$has_nested_release_candidate" != true ]; then
            exit 0
          fi

          {
            echo "### Release Please Guardrail"
            echo "- The push landed on \`main\` as a default merge commit: \`${head_subject}\`."
            echo "- Release Please created no release PR or tag, but earlier commits since ${last_tag:-the repo start} contain releasable Conventional Commit subjects."
            echo "- This usually means the PR was merged with GitHub's default merge-commit title instead of a Conventional Commit title."
            echo "- Fix the merge strategy: squash-merge releasable PRs with a Conventional Commit title, or edit the merge commit title before merging."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::error::Release Please found releasable commits behind an unparseable merge commit title. Use squash merge or edit the merge commit title to a Conventional Commit."
          exit 1

      - name: Add changelog brief to release PR
        uses: actions/github-script@v7
        env:
          RELEASE_PRS_JSON: ${{ steps.release_docs.outputs.prs || steps.release_default.outputs.prs || '' }}
        with:
          script: |
            const markerStart = '<!-- release-please-changelog-brief:start -->';
            const markerEnd = '<!-- release-please-changelog-brief:end -->';

            function extractChangelogBrief(patch) {
              const addedLines = patch
                .split('\n')
                .filter((line) => line.startsWith('+') && !line.startsWith('+++'))
                .map((line) => line.slice(1));

              const releaseStart = addedLines.findIndex(
                (line) => /^## \[/.test(line) && !/\[Unreleased\]/i.test(line)
              );

              if (releaseStart === -1) {
                return '';
              }

              const section = [addedLines[releaseStart]];
              let bulletsForHeading = 0;
              let hasHeading = false;

              for (let i = releaseStart + 1; i < addedLines.length; i += 1) {
                const line = addedLines[i];

                if (/^## \[/.test(line)) {
                  break;
                }

                if (/^### /.test(line)) {
                  section.push('', line);
                  bulletsForHeading = 0;
                  hasHeading = true;
                  continue;
                }

                if (/^- /.test(line)) {
                  if (!hasHeading || bulletsForHeading < 3) {
                    section.push(line);
                    bulletsForHeading += 1;
                  }
                }
              }

              return section.join('\n').trim();
            }

            function upsertBrief(body, brief) {
              const block = `${markerStart}\n## Changelog Brief\n\n${brief}\n${markerEnd}`;
              if (!body) {
                return block;
              }

              const pattern = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`);
              if (pattern.test(body)) {
                return body.replace(pattern, block);
              }

              return `${body.trim()}\n\n${block}`;
            }

            const rawPrs = process.env.RELEASE_PRS_JSON;
            if (!rawPrs) {
              core.info('No release PR payload available.');
              return;
            }

            const parsedPrs = JSON.parse(rawPrs);
            const prs = Array.isArray(parsedPrs) ? parsedPrs : [parsedPrs].filter(Boolean);
            if (prs.length === 0) {
              core.info('No release PRs to update.');
              return;
            }

            for (const pr of prs) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });

              const changelogFile = files.find((file) => file.filename === 'CHANGELOG.md');
              if (!changelogFile?.patch) {
                core.info(`PR #${pr.number} does not include a parsable CHANGELOG.md patch.`);
                continue;
              }

              const brief = extractChangelogBrief(changelogFile.patch);
              if (!brief) {
                core.info(`PR #${pr.number} has no release section to summarize yet.`);
                continue;
              }

              const nextBody = upsertBrief(pr.body ?? '', brief);
              if (nextBody === (pr.body ?? '')) {
                core.info(`PR #${pr.number} already has the current changelog brief.`);
                continue;
              }

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: nextBody,
              });
            }

      # Tags created by release-please use GITHUB_TOKEN, so publish in the same run.
      - name: Check out release tag
        if: ${{ steps.release_outcome.outputs.release_created == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.release_outcome.outputs.tag_name }}

      - name: Set up Node.js
        if: ${{ steps.release_outcome.outputs.release_created == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing support
        if: ${{ steps.release_outcome.outputs.release_created == 'true' }}
        run: npm install -g npm@latest

      - name: Smoke test CLI
        if: ${{ steps.release_outcome.outputs.release_created == 'true' }}
        run: node ./bin/miica-kit.mjs help

      - name: Preview publish tarball
        if: ${{ steps.release_outcome.outputs.release_created == 'true' }}
        run: npm pack --dry-run

      - name: Publish package
        if: ${{ steps.release_outcome.outputs.release_created == 'true' }}
        run: npm publish --access public --provenance
